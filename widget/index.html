<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snezhnaya Countdown Widget</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1b3d">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/bg-snezhnaya.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    /* Full-page background — upload as bg-snezhnaya.jpg at repo root.
       "center 20%" keeps the top portion (face) in view instead of
       centering on the middle of the image. Adjust the % to taste:
       lower % shows more of the top, higher % shows more of the bottom. */
    background: linear-gradient(180deg, rgba(5,10,30,0.35), rgba(5,10,30,0.75)), url('/bg-snezhnaya.jpg');
    background-size: cover;
    background-position: center 20%;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: fixed;
    inset: 0;
  }

  .widget {
    width: 100%;
    max-width: 420px;
    /* Separate image just for the card — upload as widget-bg.jpg
       at repo root, or change the filename below. */
    background: linear-gradient(180deg, rgba(13,27,61,0.45), rgba(13,27,61,0.88)), url('/widget-bg.jpg');
    background-size: cover;
    background-position: center 20%;
    background-repeat: no-repeat;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 28px;
    padding: 22px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 8px 32px rgba(0,0,20,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .tag {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.1);
    padding: 6px 12px;
    border-radius: 20px;
  }

  .quote {
    font-size: 14px;
    line-height: 1.5;
    color: rgba(255,255,255,0.85);
    margin-bottom: 18px;
    font-style: italic;
  }

  .timer {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 10px 0;
  }

  .num {
    font-size: 26px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
  }

  .watermark {
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .done {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    color: #ffd76a;
    padding: 20px 0;
  }

  .install-btn {
    display: none;
    margin: 16px auto 0;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="top-row">
    <div class="icon-btn">❄️</div>
    <div class="tag">SNEZHNAYA</div>
    <div class="icon-btn">⚙️</div>
  </div>

  <div class="quote">"                    "</div>

  <div class="timer" id="timer">
    <div class="block"><div class="num" id="d">00</div><div class="label">DAYS</div></div>
    <div class="block"><div class="num" id="h">00</div><div class="label">HRS</div></div>
    <div class="block"><div class="num" id="m">00</div><div class="label">MIN</div></div>
    <div class="block"><div class="num" id="s">00</div><div class="label">SEC</div></div>
  </div>

  <div class="footer">
    <span>Genshin 7.0 Maintenance</span>
    <span class="watermark">@Genshinimpactzone</span>
  </div>

  <button class="install-btn" id="installBtn">+ Add to Home Screen</button>
</div>

<script>
  const target = new Date("2026-08-12T03:30:00+05:30").getTime();
  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  const timerEl = document.getElementById('timer');

  function pad(n) { return n.toString().padStart(2, '0'); }

  function tick() {
    let diff = target - Date.now();
    if (diff <= 0) {
      timerEl.innerHTML = '<div class="done">MAINTENANCE IS LIVE</div>';
      return;
    }
    const days = Math.floor(diff / 86400000);
    diff -= days * 86400000;
    const hours = Math.floor(diff / 3600000);
    diff -= hours * 3600000;
    const minutes = Math.floor(diff / 60000);
    diff -= minutes * 60000;
    const seconds = Math.floor(diff / 1000);
    dEl.textContent = pad(days);
    hEl.textContent = pad(hours);
    mEl.textContent = pad(minutes);
    sEl.textContent = pad(seconds);
  }
  tick();
  setInterval(tick, 1000);

  // "Add to Home Screen" prompt (Android/Chrome)
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });

  // Register service worker so Chrome treats this as installable
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>

</body>
</html>
